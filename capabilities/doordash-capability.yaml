naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive Classic API
  description: The DoorDash Drive Classic API is the legacy version of the Drive API, designed for large enterprises and middleware
    providers who require extensive configuration and customizability for their delivery integrations. It provides endpoints
    for managing businesses, stores, and deliveries through DoorDash's logistics platform. While still supported, DoorDash
    recommends new integrations use the newer Drive API (v2) instead.
  tags:
  - Doordash
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: doordash
    baseUri: https://openapi.doordash.com/drive/v1
    description: DoorDash Drive Classic API HTTP API.
    authentication:
      type: bearer
      token: '{{DOORDASH_TOKEN}}'
    resources:
    - name: estimates
      path: /estimates
      operations:
      - name: createdeliveryestimate
        method: POST
        description: Create a delivery estimate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries
      path: /deliveries
      operations:
      - name: createdelivery
        method: POST
        description: Create a delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries-external-delivery-id
      path: /deliveries/{external_delivery_id}
      operations:
      - name: getdelivery
        method: GET
        description: Get delivery details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatedelivery
        method: PATCH
        description: Update a delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries-external-delivery-id-cancel
      path: /deliveries/{external_delivery_id}/cancel
      operations:
      - name: canceldelivery
        method: PUT
        description: Cancel a delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: businesses
      path: /businesses
      operations:
      - name: listbusinesses
        method: GET
        description: List businesses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createbusiness
        method: POST
        description: Create a business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: businesses-external-business-id
      path: /businesses/{external_business_id}
      operations:
      - name: getbusiness
        method: GET
        description: Get business details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebusiness
        method: PATCH
        description: Update a business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: businesses-external-business-id-stores
      path: /businesses/{external_business_id}/stores
      operations:
      - name: createstore
        method: POST
        description: Create a store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: businesses-external-business-id-stores-external-
      path: /businesses/{external_business_id}/stores/{external_store_id}
      operations:
      - name: getstore
        method: GET
        description: Get store details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatestore
        method: PATCH
        description: Update a store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: doordash-rest
    description: REST adapter for DoorDash Drive Classic API.
    resources:
    - path: /estimates
      name: createdeliveryestimate
      operations:
      - method: POST
        name: createdeliveryestimate
        description: Create a delivery estimate
        call: doordash.createdeliveryestimate
        outputParameters:
        - type: object
          mapping: $.
    - path: /deliveries
      name: createdelivery
      operations:
      - method: POST
        name: createdelivery
        description: Create a delivery
        call: doordash.createdelivery
        outputParameters:
        - type: object
          mapping: $.
    - path: /deliveries/{external_delivery_id}
      name: getdelivery
      operations:
      - method: GET
        name: getdelivery
        description: Get delivery details
        call: doordash.getdelivery
        outputParameters:
        - type: object
          mapping: $.
    - path: /deliveries/{external_delivery_id}
      name: updatedelivery
      operations:
      - method: PATCH
        name: updatedelivery
        description: Update a delivery
        call: doordash.updatedelivery
        outputParameters:
