        outputParameters:
        - type: object
          mapping: $.
    - path: /businesses/{external_business_id}
      name: getbusiness
      operations:
      - method: GET
        name: getbusiness
        description: Get business details
        call: doordash.getbusiness
        outputParameters:
        - type: object
          mapping: $.
    - path: /businesses/{external_business_id}
      name: updatebusiness
      operations:
      - method: PATCH
        name: updatebusiness
        description: Update a business
        call: doordash.updatebusiness
        outputParameters:
        - type: object
          mapping: $.
    - path: /businesses/{external_business_id}/stores
      name: createstore
      operations:
      - method: POST
        name: createstore
        description: Create a store
        call: doordash.createstore
        outputParameters:
        - type: object
