naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive API — Addresses
  description: 'DoorDash Drive API — Addresses. 1 operation(s). Lead operation: Get Address Suggestions. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Drive
  - Addresses
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: drive-addresses
    baseUri: https://openapi.doordash.com/drive/v2
    description: DoorDash Drive API — Addresses business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: addresses
      path: /addresses
      operations:
      - name: getAddressSuggestions
        method: GET
        description: Get Address Suggestions
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: Partial address string to get suggestions for.
        - name: latitude
          in: query
          type: number
          required: false
          description: Latitude coordinate to bias results toward a location.
        - name: longitude
          in: query
          type: number
          required: false
          description: Longitude coordinate to bias results toward a location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: drive-addresses-rest
    port: 8080
    description: REST adapter for DoorDash Drive API — Addresses. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/addresses
      name: addresses
      description: REST surface for /v1/addresses.
      operations:
      - method: GET
        name: getAddressSuggestions
        description: Get Address Suggestions
        call: drive-addresses.getAddressSuggestions
        with:
          query: rest.query
          latitude: rest.latitude
          longitude: rest.longitude
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drive-addresses-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Drive API — Addresses. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-address-suggestions
      description: Get Address Suggestions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-addresses.getAddressSuggestions
      with:
        query: tools.query
        latitude: tools.latitude
        longitude: tools.longitude
      outputParameters:
      - type: object
        mapping: $.
