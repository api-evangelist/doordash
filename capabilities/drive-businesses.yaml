naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive API — Businesses
  description: 'DoorDash Drive API — Businesses. 4 operations. Lead operation: List businesses. Self-contained Naftiko capability
    covering one Doordash business surface.'
  tags:
  - Doordash
  - Businesses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOORDASH_API_KEY: DOORDASH_API_KEY
capability:
  consumes:
  - type: http
    namespace: drive-businesses
    baseUri: https://openapi.doordash.com/drive/v2
    description: DoorDash Drive API — Businesses business capability. Self-contained, no shared references.
    resources:
    - name: businesses
      path: /businesses
      operations:
      - name: listbusinesses
        method: GET
        description: List businesses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createbusiness
        method: POST
        description: Create a business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: businesses-external_business_id
      path: /businesses/{external_business_id}
      operations:
      - name: getbusiness
        method: GET
        description: Get business details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebusiness
        method: PATCH
        description: Update a business
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOORDASH_API_KEY}}'
  exposes:
  - type: rest
    namespace: drive-businesses-rest
    port: 8080
    description: REST adapter for DoorDash Drive API — Businesses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/businesses
      name: businesses
      description: REST surface for businesses.
      operations:
      - method: GET
        name: listbusinesses
        description: List businesses
        call: drive-businesses.listbusinesses
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbusiness
        description: Create a business
        call: drive-businesses.createbusiness
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/businesses/{external-business-id}
      name: businesses-external-business-id
      description: REST surface for businesses-external_business_id.
      operations:
      - method: GET
        name: getbusiness
        description: Get business details
        call: drive-businesses.getbusiness
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatebusiness
        description: Update a business
        call: drive-businesses.updatebusiness
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drive-businesses-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Drive API — Businesses. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-businesses
      description: List businesses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-businesses.listbusinesses
      outputParameters:
      - type: object
        mapping: $.
    - name: create-business
      description: Create a business
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drive-businesses.createbusiness
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-business-details
      description: Get business details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-businesses.getbusiness
      outputParameters:
      - type: object
        mapping: $.
    - name: update-business
      description: Update a business
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drive-businesses.updatebusiness
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
