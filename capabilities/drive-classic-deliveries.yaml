    namespace: drive-classic-deliveries
    baseUri: https://openapi.doordash.com/drive/v1
    description: DoorDash Drive Classic API — Deliveries business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: estimates
      path: /estimates
      operations:
      - name: createDeliveryEstimate
        method: POST
        description: Create a Delivery Estimate
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries
      path: /deliveries
      operations:
      - name: createDelivery
        method: POST
        description: Create a Delivery
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries-external-delivery-id
      path: /deliveries/{external_delivery_id}
      operations:
      - name: getDelivery
        method: GET
        description: Get Delivery Details
        inputParameters:
        - name: external_delivery_id
          in: path
          type: string
          required: true
          description: The unique external delivery ID provided when creating the delivery.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateDelivery
        method: PATCH
        description: Update a Delivery
        inputParameters:
        - name: external_delivery_id
          in: path
          type: string
          required: true
          description: The unique external delivery ID provided when creating the delivery.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deliveries-external-delivery-id-cancel
      path: /deliveries/{external_delivery_id}/cancel
      operations:
      - name: cancelDelivery
        method: PUT
        description: Cancel a Delivery
        inputParameters:
        - name: external_delivery_id
          in: path
          type: string
          required: true
          description: The unique external delivery ID provided when creating the delivery.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: drive-classic-deliveries-rest
    port: 8080
    description: REST adapter for DoorDash Drive Classic API — Deliveries. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/estimates
      name: estimates
      description: REST surface for /v1/estimates.
      operations:
      - method: POST
        name: createDeliveryEstimate
        description: Create a Delivery Estimate
        call: drive-classic-deliveries.createDeliveryEstimate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deliveries
      name: deliveries
      description: REST surface for /v1/deliveries.
      operations:
      - method: POST
        name: createDelivery
        description: Create a Delivery
        call: drive-classic-deliveries.createDelivery
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deliveries/{external-delivery-id}
      name: deliveries-external-delivery-id
      description: REST surface for /v1/deliveries/{external-delivery-id}.
      operations:
      - method: GET
        name: getDelivery
        description: Get Delivery Details
        call: drive-classic-deliveries.getDelivery
        with:
          external_delivery_id: rest.external_delivery_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateDelivery
        description: Update a Delivery
        call: drive-classic-deliveries.updateDelivery
        with:
          external_delivery_id: rest.external_delivery_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deliveries/{external-delivery-id}/cancel
      name: deliveries-external-delivery-id-cancel
      description: REST surface for /v1/deliveries/{external-delivery-id}/cancel.
      operations:
      - method: PUT
        name: cancelDelivery
        description: Cancel a Delivery
        call: drive-classic-deliveries.cancelDelivery
        with:
          external_delivery_id: rest.external_delivery_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
