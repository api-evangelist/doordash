naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive Classic API — Deliveries
  description: 'DoorDash Drive Classic API — Deliveries. 5 operation(s). Lead operation: Create a Delivery Estimate. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Drive Classic
  - Deliveries
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
