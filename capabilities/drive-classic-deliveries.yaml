        destructive: false
        idempotent: false
      call: drive-classic-deliveries.createDeliveryEstimate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-delivery
      description: Create a Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drive-classic-deliveries.createDelivery
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-delivery-details
      description: Get Delivery Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-classic-deliveries.getDelivery
      with:
        external_delivery_id: tools.external_delivery_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-delivery
      description: Update a Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drive-classic-deliveries.updateDelivery
      with:
        external_delivery_id: tools.external_delivery_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-delivery
      description: Cancel a Delivery
      hints:
        readOnly: false
        destructive: false
        idempotent: true
