naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive API — Stores
  description: 'DoorDash Drive API — Stores. 3 operations. Lead operation: Create a store. Self-contained Naftiko capability
    covering one Doordash business surface.'
  tags:
  - Doordash
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOORDASH_API_KEY: DOORDASH_API_KEY
capability:
  consumes:
  - type: http
    namespace: drive-stores
    baseUri: https://openapi.doordash.com/drive/v2
    description: DoorDash Drive API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: businesses-external_business_id-stores
      path: /businesses/{external_business_id}/stores
      operations:
      - name: createstore
        method: POST
        description: Create a store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: businesses-external_business_id-stores-external_store_id
      path: /businesses/{external_business_id}/stores/{external_store_id}
      operations:
      - name: getstore
        method: GET
        description: Get store details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatestore
        method: PATCH
        description: Update a store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOORDASH_API_KEY}}'
  exposes:
  - type: rest
    namespace: drive-stores-rest
    port: 8080
    description: REST adapter for DoorDash Drive API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/businesses/{external-business-id}/stores
      name: businesses-external-business-id-stores
      description: REST surface for businesses-external_business_id-stores.
      operations:
      - method: POST
        name: createstore
        description: Create a store
        call: drive-stores.createstore
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/businesses/{external-business-id}/stores/{external-store-id}
      name: businesses-external-business-id-stores-external-store-id
      description: REST surface for businesses-external_business_id-stores-external_store_id.
      operations:
      - method: GET
        name: getstore
        description: Get store details
        call: drive-stores.getstore
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatestore
        description: Update a store
        call: drive-stores.updatestore
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drive-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Drive API — Stores. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-store
      description: Create a store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drive-stores.createstore
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store-details
      description: Get store details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-stores.getstore
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store
      description: Update a store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drive-stores.updatestore
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
