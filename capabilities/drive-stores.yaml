naftiko: 1.0.0-alpha2
info:
  label: DoorDash Drive API — Stores
  description: 'DoorDash Drive API — Stores. 3 operation(s). Lead operation: Create a Store. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Drive
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: drive-stores
    baseUri: https://openapi.doordash.com/drive/v2
    description: DoorDash Drive API — Stores business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: businesses-external-business-id-stores
      path: /businesses/{external_business_id}/stores
      operations:
      - name: createStore
        method: POST
        description: Create a Store
        inputParameters:
        - name: external_business_id
          in: path
          type: string
          required: true
          description: The unique external identifier for the business.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: businesses-external-business-id-stores-external-store-id
      path: /businesses/{external_business_id}/stores/{external_store_id}
      operations:
      - name: getStore
        method: GET
        description: Get Store Details
        inputParameters:
        - name: external_business_id
          in: path
          type: string
          required: true
          description: The unique external identifier for the business.
        - name: external_store_id
          in: path
          type: string
          required: true
          description: The unique external identifier for the store.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateStore
        method: PATCH
        description: Update a Store
        inputParameters:
        - name: external_business_id
          in: path
          type: string
          required: true
          description: The unique external identifier for the business.
        - name: external_store_id
          in: path
          type: string
          required: true
          description: The unique external identifier for the store.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: drive-stores-rest
    port: 8080
    description: REST adapter for DoorDash Drive API — Stores. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/businesses/{external-business-id}/stores
      name: businesses-external-business-id-stores
      description: REST surface for /v1/businesses/{external-business-id}/stores.
      operations:
      - method: POST
        name: createStore
        description: Create a Store
        call: drive-stores.createStore
        with:
          external_business_id: rest.external_business_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/businesses/{external-business-id}/stores/{external-store-id}
      name: businesses-external-business-id-stores-external-store-id
      description: REST surface for /v1/businesses/{external-business-id}/stores/{external-store-id}.
      operations:
      - method: GET
        name: getStore
        description: Get Store Details
        call: drive-stores.getStore
        with:
          external_business_id: rest.external_business_id
          external_store_id: rest.external_store_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateStore
        description: Update a Store
        call: drive-stores.updateStore
        with:
          external_business_id: rest.external_business_id
          external_store_id: rest.external_store_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drive-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Drive API — Stores. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-store
      description: Create a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: drive-stores.createStore
      with:
        external_business_id: tools.external_business_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store-details
      description: Get Store Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-stores.getStore
      with:
        external_business_id: tools.external_business_id
        external_store_id: tools.external_store_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store
      description: Update a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: drive-stores.updateStore
      with:
        external_business_id: tools.external_business_id
        external_store_id: tools.external_store_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
