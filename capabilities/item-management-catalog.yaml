naftiko: 1.0.0-alpha2
info:
  label: DoorDash Item Management API — Catalog
  description: 'DoorDash Item Management API — Catalog. 2 operation(s). Lead operation: Add Items to Catalog. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Item Management
  - Catalog
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: item-management-catalog
    baseUri: https://openapi.doordash.com/marketplace/api/v2
    description: DoorDash Item Management API — Catalog business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: items
      path: /items
      operations:
      - name: createItems
        method: POST
        description: Add Items to Catalog
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateItems
        method: PATCH
        description: Update Items in Catalog
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: item-management-catalog-rest
    port: 8080
    description: REST adapter for DoorDash Item Management API — Catalog. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/items
      name: items
      description: REST surface for /v1/items.
      operations:
      - method: POST
        name: createItems
        description: Add Items to Catalog
        call: item-management-catalog.createItems
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateItems
        description: Update Items in Catalog
        call: item-management-catalog.updateItems
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: item-management-catalog-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Item Management API — Catalog. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: add-items-catalog
      description: Add Items to Catalog
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: item-management-catalog.createItems
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-items-catalog
      description: Update Items in Catalog
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: item-management-catalog.updateItems
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
