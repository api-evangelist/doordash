naftiko: 1.0.0-alpha2
info:
  label: DoorDash Item Management API — Promotions
  description: 'DoorDash Item Management API — Promotions. 2 operation(s). Lead operation: Add Promotions for Items at a Store. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Item Management
  - Promotions
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: item-management-promotions
    baseUri: https://openapi.doordash.com/marketplace/api/v2
    description: DoorDash Item Management API — Promotions business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: promotions-stores-store-location-id
      path: /promotions/stores/{store_location_id}
      operations:
      - name: createStorePromotions
        method: POST
        description: Add Promotions for Items at a Store
        inputParameters:
        - name: store_location_id
          in: path
          type: string
          required: true
          description: The unique identifier for the store location.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateStorePromotions
        method: PATCH
        description: Update Promotions for Items at a Store
        inputParameters:
        - name: store_location_id
          in: path
          type: string
          required: true
          description: The unique identifier for the store location.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: item-management-promotions-rest
    port: 8080
    description: REST adapter for DoorDash Item Management API — Promotions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/promotions/stores/{store-location-id}
      name: promotions-stores-store-location-id
      description: REST surface for /v1/promotions/stores/{store-location-id}.
      operations:
      - method: POST
        name: createStorePromotions
        description: Add Promotions for Items at a Store
        call: item-management-promotions.createStorePromotions
        with:
          store_location_id: rest.store_location_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateStorePromotions
        description: Update Promotions for Items at a Store
        call: item-management-promotions.updateStorePromotions
        with:
          store_location_id: rest.store_location_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: item-management-promotions-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Item Management API — Promotions. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: add-promotions-items-store
      description: Add Promotions for Items at a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: item-management-promotions.createStorePromotions
      with:
        store_location_id: tools.store_location_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-promotions-items-store
      description: Update Promotions for Items at a Store
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: item-management-promotions.updateStorePromotions
      with:
        store_location_id: tools.store_location_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
