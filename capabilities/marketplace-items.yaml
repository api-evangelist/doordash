naftiko: 1.0.0-alpha2
info:
  label: DoorDash Marketplace API — Items
  description: 'DoorDash Marketplace API — Items. 1 operations. Lead operation: Update item availability. Self-contained Naftiko
    capability covering one Doordash business surface.'
  tags:
  - Doordash
  - Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOORDASH_API_KEY: DOORDASH_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketplace-items
    baseUri: https://openapi.doordash.com/marketplace/api/v1
    description: DoorDash Marketplace API — Items business capability. Self-contained, no shared references.
    resources:
    - name: stores-merchant_supplied_id-item_status
      path: /stores/{merchant_supplied_id}/item_status
      operations:
      - name: updateitemstatus
        method: PATCH
        description: Update item availability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOORDASH_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketplace-items-rest
    port: 8080
    description: REST adapter for DoorDash Marketplace API — Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stores/{merchant-supplied-id}/item-status
      name: stores-merchant-supplied-id-item-status
      description: REST surface for stores-merchant_supplied_id-item_status.
      operations:
      - method: PATCH
        name: updateitemstatus
        description: Update item availability
        call: marketplace-items.updateitemstatus
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Marketplace API — Items. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: update-item-availability
      description: Update item availability
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketplace-items.updateitemstatus
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
