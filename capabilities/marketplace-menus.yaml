naftiko: 1.0.0-alpha2
info:
  label: DoorDash Marketplace API — Menus
  description: 'DoorDash Marketplace API — Menus. 2 operation(s). Lead operation: Create a Menu. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Marketplace
  - Menus
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: marketplace-menus
    baseUri: https://openapi.doordash.com/marketplace/api/v1
    description: DoorDash Marketplace API — Menus business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: menus
      path: /menus
      operations:
      - name: createMenu
        method: POST
        description: Create a Menu
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: menus-menu-id
      path: /menus/{menu_id}
      operations:
      - name: updateMenu
        method: PATCH
        description: Update a Menu
        inputParameters:
        - name: menu_id
          in: path
          type: string
          required: true
          description: The unique identifier for the menu.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marketplace-menus-rest
    port: 8080
    description: REST adapter for DoorDash Marketplace API — Menus. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/menus
      name: menus
      description: REST surface for /v1/menus.
      operations:
      - method: POST
        name: createMenu
        description: Create a Menu
        call: marketplace-menus.createMenu
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/menus/{menu-id}
      name: menus-menu-id
      description: REST surface for /v1/menus/{menu-id}.
      operations:
      - method: PATCH
        name: updateMenu
        description: Update a Menu
        call: marketplace-menus.updateMenu
        with:
          menu_id: rest.menu_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-menus-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Marketplace API — Menus. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-menu
      description: Create a Menu
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketplace-menus.createMenu
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-menu
      description: Update a Menu
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketplace-menus.updateMenu
      with:
        menu_id: tools.menu_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
