naftiko: 1.0.0-alpha2
info:
  label: DoorDash Marketplace API — Menus
  description: 'DoorDash Marketplace API — Menus. 2 operations. Lead operation: Create a menu. Self-contained Naftiko capability
    covering one Doordash business surface.'
  tags:
  - Doordash
  - Menus
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOORDASH_API_KEY: DOORDASH_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketplace-menus
    baseUri: https://openapi.doordash.com/marketplace/api/v1
    description: DoorDash Marketplace API — Menus business capability. Self-contained, no shared references.
    resources:
    - name: menus
      path: /menus
      operations:
      - name: createmenu
        method: POST
        description: Create a menu
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: menus-menu_id
      path: /menus/{menu_id}
      operations:
      - name: updatemenu
        method: PATCH
        description: Update a menu
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.DOORDASH_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketplace-menus-rest
    port: 8080
    description: REST adapter for DoorDash Marketplace API — Menus. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/menus
      name: menus
      description: REST surface for menus.
      operations:
      - method: POST
        name: createmenu
        description: Create a menu
        call: marketplace-menus.createmenu
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/menus/{menu-id}
      name: menus-menu-id
      description: REST surface for menus-menu_id.
      operations:
      - method: PATCH
        name: updatemenu
        description: Update a menu
        call: marketplace-menus.updatemenu
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-menus-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Marketplace API — Menus. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-menu
      description: Create a menu
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketplace-menus.createmenu
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-menu
      description: Update a menu
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketplace-menus.updatemenu
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
