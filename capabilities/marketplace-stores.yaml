naftiko: 1.0.0-alpha2
info:
  label: DoorDash Marketplace API — Stores
  description: 'DoorDash Marketplace API — Stores. 3 operation(s). Lead operation: Get Store Details. Self-contained Naftiko capability covering one DoorDash business surface.'
  tags:
  - DoorDash
  - Marketplace
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    DOORDASH_JWT: DOORDASH_JWT
capability:
  consumes:
  - type: http
    namespace: marketplace-stores
    baseUri: https://openapi.doordash.com/marketplace/api/v1
    description: DoorDash Marketplace API — Stores business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.DOORDASH_JWT}}'
    resources:
    - name: stores-merchant-supplied-id-store-details
      path: /stores/{merchant_supplied_id}/store_details
      operations:
      - name: getStoreDetails
        method: GET
        description: Get Store Details
        inputParameters:
        - name: merchant_supplied_id
          in: path
          type: string
          required: true
          description: The merchant-supplied identifier for the store.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stores-merchant-supplied-id-menu-details
      path: /stores/{merchant_supplied_id}/menu_details
      operations:
      - name: getMenuDetails
        method: GET
        description: Get Menu Details for a Store
        inputParameters:
        - name: merchant_supplied_id
          in: path
          type: string
          required: true
          description: The merchant-supplied identifier for the store.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stores-merchant-supplied-id-status
      path: /stores/{merchant_supplied_id}/status
      operations:
      - name: updateStoreStatus
        method: PATCH
        description: Update Store Status
        inputParameters:
        - name: merchant_supplied_id
          in: path
          type: string
          required: true
          description: The merchant-supplied identifier for the store.
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marketplace-stores-rest
    port: 8080
    description: REST adapter for DoorDash Marketplace API — Stores. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/stores/{merchant-supplied-id}/store-details
      name: stores-merchant-supplied-id-store-details
      description: REST surface for /v1/stores/{merchant-supplied-id}/store-details.
      operations:
      - method: GET
        name: getStoreDetails
        description: Get Store Details
        call: marketplace-stores.getStoreDetails
        with:
          merchant_supplied_id: rest.merchant_supplied_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{merchant-supplied-id}/menu-details
      name: stores-merchant-supplied-id-menu-details
      description: REST surface for /v1/stores/{merchant-supplied-id}/menu-details.
      operations:
      - method: GET
        name: getMenuDetails
        description: Get Menu Details for a Store
        call: marketplace-stores.getMenuDetails
        with:
          merchant_supplied_id: rest.merchant_supplied_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stores/{merchant-supplied-id}/status
      name: stores-merchant-supplied-id-status
      description: REST surface for /v1/stores/{merchant-supplied-id}/status.
      operations:
      - method: PATCH
        name: updateStoreStatus
        description: Update Store Status
        call: marketplace-stores.updateStoreStatus
        with:
          merchant_supplied_id: rest.merchant_supplied_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for DoorDash Marketplace API — Stores. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-store-details
      description: Get Store Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-stores.getStoreDetails
      with:
        merchant_supplied_id: tools.merchant_supplied_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-menu-details-store
      description: Get Menu Details for a Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-stores.getMenuDetails
      with:
        merchant_supplied_id: tools.merchant_supplied_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-store-status
      description: Update Store Status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketplace-stores.updateStoreStatus
      with:
        merchant_supplied_id: tools.merchant_supplied_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
