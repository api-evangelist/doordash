specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: doordash
providerId: doordash
publisherName: DoorDash, Inc.
serviceCategory: Last-Mile Delivery
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Delivery
  - Logistics
  - Last Mile
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for DoorDash Drive. Per-delivery billing (distance-based base
  fee plus optional per-mile surcharge for the current Drive API; flat fee for Drive classic). Settlement
  is via Stripe credit-card by default; monthly invoicing with ACH/check is available on request.
sources:
  - https://developer.doordash.com/en-US/docs/drive/overview/pricing_payment/
  - https://developer.doordash.com/en-US/docs/drive/overview/faqs/
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: Continuous Settlement
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Refund
    - Tax
focusColumns:
  ServiceName: DoorDash Drive
  ServiceCategory: Last-Mile Delivery
  ProviderName: DoorDash
  PublisherName: DoorDash, Inc.
  InvoiceIssuerName: DoorDash, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: deliveries
    description: Count of created deliveries (billable at request time)
    unit: delivery
    aggregation: count
    dimensions:
      - api_version
      - market
      - distance_band
  - name: distance_miles
    description: Pickup-to-dropoff miles used for the per-mile surcharge
    unit: mile
    aggregation: sum
    dimensions:
      - api_version
  - name: tips_passed_through
    description: End-user tips passed through to the Dasher
    unit: USD
    aggregation: sum
    dimensions:
      - api_version
  - name: returns
    description: Return-to-pickup deliveries (billed at 60% of original fee)
    unit: delivery
    aggregation: count
    dimensions:
      - api_version
principles:
  - name: Visibility
    description: Each delivery request triggers a Stripe charge; reconcile against the credit-card statement
      or the monthly invoice when ACH terms are in place.
  - name: Allocation
    description: Tag deliveries by store/storefront and order channel so cost can be attributed to the
      revenue-generating order.
  - name: Optimization
    description: Keep deliveries under 5 miles where possible to avoid the per-mile surcharge; pass through
      end-user tips to capture the $2.75 base-rate discount; minimise returns.
  - name: Accountability
    description: Operations / fulfilment owner reconciles delivery cost against AOV and runs SLA reviews
      with DoorDash support.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
