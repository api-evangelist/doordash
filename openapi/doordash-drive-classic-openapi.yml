    StoreRequest:
      type: object
      required:
      - external_store_id
      - name
      - address
      properties:
        external_store_id:
          type: string
          description: >-
            A unique external identifier for the store.
          example: D-12345
        name:
          type: string
          description: >-
            The name of the store.
          example: Acme Pickup Store
        phone_number:
          type: string
          description: >-
            The phone number for the store.
          example: '+15555551234'
        address:
          type: string
          description: >-
            The full street address of the store.
          example: 901 Market St, San Francisco, CA 94105
    Error:
