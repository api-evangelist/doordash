        delivery_status:
          type: string
          description: >-
            The current status of the delivery.
          enum:
          - created
          - confirmed
          - enroute_to_pickup
          - arrived_at_pickup
          - picked_up
          - enroute_to_dropoff
          - arrived_at_dropoff
          - delivered
          - cancelled
          - returned
          example: created
        fee:
          type: integer
          description: >-
            The delivery fee in cents.
          example: 42
        currency:
          type: string
          description: >-
            The currency code.
          example: USD
        tip:
          type: integer
          description: >-
            The tip amount in cents.
          example: 42
        pickup_address:
          type: string
          description: >-
            The pickup address.
          example: 901 Market St, San Francisco, CA 94105
        dropoff_address:
          type: string
          description: >-
            The dropoff address.
          example: 901 Market St, San Francisco, CA 94105
        pickup_time_estimated:
          type: string
          format: date-time
          description: >-
            The estimated pickup time.
          example: '2026-06-02T14:30:00Z'
        pickup_time_actual:
          type: string
          format: date-time
          description: >-
            The actual pickup time.
          example: '2026-06-02T14:30:00Z'
        dropoff_time_estimated:
          type: string
          format: date-time
          description: >-
            The estimated dropoff time.
          example: '2026-06-02T14:30:00Z'
        dropoff_time_actual:
          type: string
          format: date-time
          description: >-
            The actual dropoff time.
          example: '2026-06-02T14:30:00Z'
        dasher_id:
          type: integer
          description: >-
            The assigned Dasher's ID.
          example: 42
        dasher_name:
          type: string
          description: >-
            The assigned Dasher's first name.
          example: Acme Pickup Store
        tracking_url:
          type: string
          format: uri
          description: >-
            A URL for tracking the delivery.
