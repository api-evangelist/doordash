components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JWT token signed with your DoorDash developer credentials.
  parameters:
    ExternalDeliveryId:
      name: external_delivery_id
      in: path
      required: true
      description: >-
        The unique external delivery ID provided when creating the delivery.
      schema:
        type: string
    ExternalBusinessId:
      name: external_business_id
      in: path
      required: true
      description: >-
        The unique external identifier for the business.
      schema:
        type: string
    ExternalStoreId:
      name: external_store_id
      in: path
      required: true
      description: >-
        The unique external identifier for the store.
      schema:
        type: string
  schemas:
    EstimateRequest:
      type: object
      required:
      - pickup_address
      - dropoff_address
      properties:
        pickup_address:
          type: string
          description: >-
            The full street address for the pickup location.
          example: 901 Market St, San Francisco, CA 94105
        dropoff_address:
          type: string
          description: >-
            The full street address for the dropoff location.
          example: 901 Market St, San Francisco, CA 94105
        pickup_time:
          type: string
          format: date-time
          description: >-
            The requested pickup time in UTC ISO-8601 format.
          example: '2026-06-02T14:30:00Z'
        order_value:
          type: integer
          description: >-
            The total value of the order in cents.
          example: 42
    Estimate:
      type: object
      properties:
        fee:
          type: integer
          description: >-
            The estimated delivery fee in cents.
          example: 42
        currency:
          type: string
          description: >-
            The currency code for the fee amount.
          example: USD
        pickup_time:
          type: string
          format: date-time
          description: >-
            The estimated pickup time.
          example: '2026-06-02T14:30:00Z'
        dropoff_time:
          type: string
          format: date-time
          description: >-
            The estimated dropoff time.
          example: '2026-06-02T14:30:00Z'
        delivery_duration:
          type: integer
          description: >-
            The estimated delivery duration in seconds.
          example: 42
    ClassicDeliveryRequest:
      type: object
      required:
      - external_delivery_id
      - pickup_address
      - dropoff_address
      properties:
        external_delivery_id:
          type: string
          description: >-
            A unique identifier for this delivery.
          example: D-12345
        pickup_address:
          type: string
          description: >-
            The full street address for the pickup location.
          example: 901 Market St, San Francisco, CA 94105
        pickup_business_name:
          type: string
          description: >-
            The business name at the pickup location.
          example: Acme Pickup Store
        pickup_phone_number:
          type: string
          description: >-
            The phone number at the pickup location.
          example: '+15555551234'
        pickup_instructions:
          type: string
          description: >-
            Special instructions for the Dasher at pickup.
          example: Leave at the front desk.
        dropoff_address:
          type: string
          description: >-
            The full street address for the dropoff location.
          example: 901 Market St, San Francisco, CA 94105
        dropoff_business_name:
          type: string
          description: >-
            The business name at the dropoff location.
          example: Acme Pickup Store
        dropoff_phone_number:
          type: string
          description: >-
            The phone number at the dropoff location.
          example: '+15555551234'
        dropoff_instructions:
          type: string
          description: >-
            Special instructions for the Dasher at dropoff.
          example: Leave at the front desk.
        dropoff_contact_given_name:
          type: string
          description: >-
            The first name of the dropoff contact.
          example: Acme Pickup Store
        dropoff_contact_family_name:
          type: string
          description: >-
            The last name of the dropoff contact.
          example: Acme Pickup Store
        order_value:
          type: integer
          description: >-
            The total value of the order in cents.
          example: 42
        tip:
          type: integer
          description: >-
            The tip amount in cents.
          example: 42
        pickup_time:
          type: string
          format: date-time
          description: >-
            The requested pickup time in UTC.
          example: '2026-06-02T14:30:00Z'
        dropoff_time:
          type: string
          format: date-time
          description: >-
            The requested dropoff time in UTC.
          example: '2026-06-02T14:30:00Z'
        contains_alcohol:
          type: boolean
          description: >-
            Whether the order contains alcohol.
          example: true
        external_business_id:
          type: string
          description: >-
            The external business ID to associate with this delivery.
          example: D-12345
        external_store_id:
          type: string
          description: >-
            The external store ID to associate with this delivery.
          example: D-12345
    ClassicDeliveryUpdateRequest:
      type: object
      properties:
        tip:
          type: integer
          description: >-
            Updated tip amount in cents.
          example: 42
        dropoff_instructions:
          type: string
          description: >-
            Updated dropoff instructions.
          example: Leave at the front desk.
        dropoff_phone_number:
          type: string
          description: >-
            Updated dropoff phone number.
          example: '+15555551234'
    ClassicDelivery:
      type: object
