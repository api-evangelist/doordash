specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: doordash
providerId: doordash
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Delivery
  - Logistics
  - Last Mile
  - On-Demand
description: DoorDash Drive is priced per delivery rather than per API call. The Drive API uses a base
  rate that scales with distance, while Drive (classic) uses a flat per-delivery fee. Tips paid by the
  end user pass through to the Dasher and are added to the merchant invoice. Sandbox use is free of charge.
sources:
  - https://developer.doordash.com/en-US/docs/drive/overview/pricing_payment/
  - https://developer.doordash.com/en-US/docs/drive/overview/faqs/
  - https://developer.doordash.com/en-US/api/drive/
  - https://developer.doordash.com/en-US/api/drive_classic/
plans:
  - id: doordash-drive-sandbox
    name: Drive Sandbox
    type: freemium
    description: Sandbox access keys allow free experimentation against the Drive API; no real deliveries
      are dispatched.
    entries:
      - label: Sandbox usage
        name: sandbox_usage
        type: subscription
        metric: account
        limit: 1
        timeFrame: year
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Sandbox access key
      - name: Mock delivery responses
      - name: No real-world fulfillment
  - id: doordash-drive
    name: Drive (current)
    type: usage-based
    description: Production Drive API; delivery fee dynamically calculated using pickup-to-dropoff distance.
      Maximum delivery distance 15 miles.
    entries:
      - label: Base rate (within 5 miles)
        name: drive_base
        type: metered
        metric: delivery
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '$9.75'
        userMultiplied: false
      - label: Per-mile surcharge beyond 5 miles
        name: drive_mile
        type: metered
        metric: mile
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '+$0.75 per mile (up to 15 miles)'
        userMultiplied: false
      - label: Tipping discount
        name: drive_tip_discount
        type: metered
        metric: delivery
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '-$2.75 if 100% of receiver tip is passed through'
        userMultiplied: false
      - label: Return-to-pickup
        name: drive_return
        type: metered
        metric: delivery
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '60% of original delivery fee'
        userMultiplied: false
    elements:
      - name: Per-delivery billing at request time
      - name: Credit-card billing via Stripe
      - name: Monthly invoice / ACH available on request
      - name: Tip pass-through to Dasher
  - id: doordash-drive-classic
    name: Drive (classic)
    type: usage-based
    description: Legacy Drive API. Flat per-delivery fee plus tips.
    entries:
      - label: Flat per-delivery fee
        name: drive_classic_flat
        type: metered
        metric: delivery
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '$7.00'
        userMultiplied: false
      - label: End-user tip
        name: drive_classic_tip
        type: metered
        metric: delivery
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: pass-through (100% to Dasher)
        userMultiplied: false
    elements:
      - name: Legacy endpoints
      - name: Per-delivery billing at request time
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
