specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: doordash
providerId: doordash
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Delivery
  - Logistics
  - Last Mile
  - Rate Limiting
description: DoorDash Drive enforces a default platform rate limit of approximately 300 requests per 60-second
  window per developer access key. The same limit applies to sandbox and production. For load or resiliency
  tests, DoorDash requires advance notice (at least 3 days) via the Support page so they can adjust the
  limit.
sources:
  - https://developer.doordash.com/en-US/docs/drive/overview/faqs/
  - https://developer.doordash.com/en-US/blog/FAQ/
responseCodes:
  throttled: 429
limits:
  - name: Drive API default
    scope: access-key
    metric: requests_per_minute
    limit: 300
    timeFrame: minute
    notes: Documented as ~300 requests in any 60-second window. Same limit applies to sandbox and production.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 responses.
  - name: Load Testing Coordination
    description: Notify DoorDash via the Support page at least 3 days before any load or resiliency testing
      so the rate limit can be adjusted.
  - name: Sandbox Parity
    description: Sandbox and production share the same throttle; sandbox keys are free for experimentation.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
