  personas:
  - id: logistics-integrator
    name: Logistics Integrator
    description: Builds on-demand delivery into a merchant ordering experience using Drive and Drive Classic.
  - id: marketplace-operator
    name: Marketplace Operator
    description: Receives and fulfills DoorDash marketplace orders and keeps menus and store status in sync.
  - id: catalog-manager
    name: Catalog Manager
    description: Manages large item catalogs, inventory, pricing, and promotions for retail and grocery partners.
  - id: finance-analyst
    name: Finance & Operations Analyst
    description: Pulls standardized financial, operations, and menu reporting data from the Reporting API.
  domains:
  - Delivery Logistics
  - Marketplace Orders
  - Catalog & Inventory
  - Reporting & Finance
  binds:
  - name: DOORDASH_JWT
    description: JWT Bearer token used by every DoorDash capability.
