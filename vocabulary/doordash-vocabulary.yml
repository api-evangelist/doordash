    - PUT
    pattern: write
  - verb: create
    httpMethods:
    - POST
    pattern: write
  - verb: get
    httpMethods:
    - GET
    pattern: read
  - verb: list
    httpMethods:
    - GET
    pattern: read
  - verb: send
    httpMethods:
    - POST
    pattern: write
  - verb: update
    httpMethods:
    - PATCH
    pattern: write
  schemas:
    drive:
    - EstimateRequest
    - Estimate
    - ClassicDeliveryRequest
