name: Doordash Domain Vocabulary
provider: Doordash
providerId: doordash
description: Tag-derived vocabulary for the Doordash API surface; sourced from openapi/ tags.
terms:
- term: Addresses
  description: Get address auto-completion suggestions based on partial input.
- term: Businesses
  description: Manage business entities that represent legal entities or owners on the DoorDash Drive platform.
- term: Deliveries
  description: Create, retrieve, update, and cancel on-demand deliveries fulfilled by DoorDash Dashers.
- term: Quotes
  description: Validate delivery serviceability and get pricing quotes before creating a delivery.
- term: Stores
  description: Manage store locations that represent individual pickup points associated with a business.
