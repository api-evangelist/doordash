vocabulary: 1.0.0
info:
  provider: DoorDash
  description: Unified vocabulary for the DoorDash developer platform, mapping the operational OpenAPI surface (Drive, Drive Classic, Marketplace, Item Management, Reporting) to the capability surface exposed as Naftiko REST and MCP adapters.
  created: '2026-06-02'
  modified: '2026-06-02'
operational:
