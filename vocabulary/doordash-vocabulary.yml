    status: active
  - name: DoorDash Marketplace API
    namespace: marketplace
    version: '1.0'
    baseUrl: https://openapi.doordash.com/marketplace/api/v1
    status: active
  - name: DoorDash Reporting API
    namespace: reporting
    version: '1.0'
    baseUrl: https://openapi.doordash.com/dataexchange/v1
    status: active
